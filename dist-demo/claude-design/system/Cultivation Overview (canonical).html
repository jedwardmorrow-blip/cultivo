<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Cult Ops · Cultivation Overview</title>
<link rel="stylesheet" href="brand-tokens.css">
<style>
  /* ═══════════════════════════════════════════════════════════════════
     Cultivation Overview — operator surface
     Density-by-task: COO at desk, Bloomberg grade. Restraint is the brand.
     Stage colors as 6px markers, never as fills. Single warm-white accent.
     ═══════════════════════════════════════════════════════════════════ */

  body { background: #1B1A18; }

  .page-wrap {
    max-width: 1700px;
    margin: 0 auto;
    padding: 56px 32px 80px;
  }

  /* ── Doc lede ─────────────────────────────────────────────── */
  .doc-eyebrow {
    font-family: var(--font-mono); font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: rgba(232,229,221,0.55); margin-bottom: 12px;
  }
  .doc-title {
    font-family: var(--font-serif); font-weight: 400;
    font-size: 44px; line-height: 1.05; letter-spacing: -0.015em;
    margin: 0 0 18px; color: #F5F2EA; max-width: 24ch;
  }
  .doc-title em { font-style: italic; color: var(--accent); }
  .doc-stand {
    font-family: var(--font-serif); font-size: 17px; line-height: 1.55;
    color: rgba(232,229,221,0.74); max-width: 62ch; margin: 0 0 40px;
  }
  .doc-meta {
    display: flex; gap: 28px; flex-wrap: wrap;
    font-family: var(--font-mono); font-size: 11px;
    color: rgba(232,229,221,0.4); letter-spacing: 0.06em;
    text-transform: uppercase;
    border-top: 1px solid rgba(232,229,221,0.10);
    border-bottom: 1px solid rgba(232,229,221,0.10);
    padding: 12px 0; margin-bottom: 56px;
  }
  .doc-meta span strong { color: rgba(232,229,221,0.7); font-weight: 500; margin-right: 8px; }

  /* ── Artboard chrome ──────────────────────────────────────── */
  .ab {
    background: var(--op-canvas); color: var(--op-ink);
    border-radius: var(--r-lg); overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04);
    position: relative;
    font-family: var(--font-sans);
  }
  .ab-tag {
    position: absolute; top: 14px; right: 16px;
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.08em; color: rgba(255,255,255,0.25);
    text-transform: uppercase; z-index: 50;
  }

  /* ── Top nav strip ────────────────────────────────────────── */
  .nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; height: 44px;
    border-bottom: 1px solid var(--op-line-strong);
    background: #0E0E0E;
  }
  .nav-l { display: flex; align-items: center; gap: 28px; }
  .nav-word {
    font-family: var(--font-sans); font-weight: 700; font-size: 12px;
    letter-spacing: 0.18em; color: var(--op-ink);
  }
  .nav-sep {
    width: 1px; height: 16px; background: var(--op-line-strong);
  }
  .nav-tabs { display: flex; gap: 0; }
  .nav-tab {
    font-family: var(--font-sans); font-size: 12px; font-weight: 500;
    color: var(--op-ink-2); padding: 0 14px; height: 44px;
    display: flex; align-items: center; letter-spacing: 0.02em;
    border-bottom: 1px solid transparent;
    cursor: default;
  }
  .nav-tab.is-active {
    color: var(--op-ink);
    border-bottom-color: var(--accent);
  }
  .nav-r {
    display: flex; align-items: center; gap: 18px;
    font-family: var(--font-mono); font-size: 11px;
    color: var(--op-ink-2); letter-spacing: 0.04em;
  }
  .nav-r .role { color: var(--op-ink); }
  .nav-r .build { color: var(--op-ink-3); }

  /* ── Header band: date, env, alerts ───────────────────────── */
  .head {
    display: grid; grid-template-columns: 1.1fr 2fr 0.9fr;
    border-bottom: 1px solid var(--op-line);
    align-items: stretch;
  }
  .head-cell { padding: 16px 24px; border-right: 1px solid var(--op-line); }
  .head-cell:last-child { border-right: none; }

  .head-eyebrow {
    font-family: var(--font-mono); font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--op-ink-3); margin-bottom: 6px;
  }
  .head-date {
    font-family: var(--font-sans); font-weight: 500; font-size: 17px;
    color: var(--op-ink); letter-spacing: -0.005em;
  }
  .head-date-sub {
    font-family: var(--font-mono); font-size: 11px;
    color: var(--op-ink-2); margin-top: 4px; letter-spacing: 0.04em;
  }
  .head-date-sub .live-dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--status-ok); margin-right: 6px; vertical-align: middle;
    box-shadow: 0 0 0 0 rgba(110,170,141,0.6);
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(110,170,141,0.5); }
    50% { box-shadow: 0 0 0 6px rgba(110,170,141,0); }
  }

  .env-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0; }
  .env-cell {
    padding-right: 18px; border-right: 1px dashed var(--op-line);
  }
  .env-cell:last-child { border-right: none; }
  .env-label {
    font-family: var(--font-mono); font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.10em;
    color: var(--op-ink-3); margin-bottom: 6px;
  }
  .env-val {
    font-family: var(--font-sans); font-weight: 500; font-size: 18px;
    color: var(--op-ink); letter-spacing: -0.01em;
  }
  .env-val .unit {
    font-family: var(--font-mono); font-weight: 400; font-size: 11px;
    color: var(--op-ink-3); margin-left: 3px;
  }
  .env-target {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--op-ink-3); margin-top: 3px; letter-spacing: 0.04em;
  }
  .env-target.ok { color: var(--status-ok); }
  .env-target.warn { color: var(--status-warn); }

  .alerts-summary {
    display: flex; align-items: center; justify-content: space-between;
    height: 100%;
  }
  .alerts-tot {
    font-family: var(--font-sans); font-weight: 500; font-size: 28px;
    letter-spacing: -0.02em; color: var(--op-ink);
  }
  .alerts-tot small {
    font-family: var(--font-mono); font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.10em;
    color: var(--op-ink-3); display: block; font-weight: 400;
    margin-bottom: 2px;
  }
  .alerts-pills { display: flex; flex-direction: column; gap: 4px; }
  .alerts-pill {
    font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.05em;
    color: var(--op-ink-2);
    display: flex; align-items: center; gap: 6px;
  }
  .alerts-pill .dot {
    width: 5px; height: 5px; border-radius: 50%;
  }
  .alerts-pill .dot.urgent { background: var(--status-bad); }
  .alerts-pill .dot.attention { background: var(--status-warn); }
  .alerts-pill .dot.watch { background: var(--op-ink-3); }
  .alerts-pill strong { color: var(--op-ink); font-weight: 500; }

  /* ── KPI strip ────────────────────────────────────────────── */
  .kpi-strip {
    display: grid; grid-template-columns: repeat(4, 1fr);
    border-bottom: 1px solid var(--op-line);
  }
  .kpi {
    padding: 18px 24px 20px;
    border-right: 1px solid var(--op-line);
    position: relative;
  }
  .kpi:last-child { border-right: none; }
  .kpi-label {
    font-family: var(--font-mono); font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--op-ink-3); margin-bottom: 8px;
  }
  .kpi-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
  .kpi-val {
    font-family: var(--font-sans); font-weight: 700; font-size: 36px;
    letter-spacing: -0.02em; color: var(--op-ink); line-height: 1;
  }
  .kpi-unit {
    font-family: var(--font-mono); font-size: 12px;
    color: var(--op-ink-3); letter-spacing: 0.04em;
  }
  .kpi-delta {
    font-family: var(--font-mono); font-size: 11px;
    color: var(--op-ink-2); margin-left: auto; letter-spacing: 0.02em;
  }
  .kpi-delta.up { color: var(--status-ok); }
  .kpi-delta.down { color: var(--status-bad); }
  .kpi-context {
    font-family: var(--font-mono); font-size: 11px;
    color: var(--op-ink-2); margin-top: 2px; letter-spacing: 0.02em;
  }
  .kpi-spark {
    position: absolute; right: 16px; top: 18px;
    width: 92px; height: 28px;
  }

  /* ── Main grid: rooms + alerts ────────────────────────────── */
  .main-grid {
    display: grid; grid-template-columns: 1.55fr 1fr;
  }
  .col-rooms { border-right: 1px solid var(--op-line); }
  .col-alerts { }

  /* Rooms board */
  .panel-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px; border-bottom: 1px solid var(--op-line);
  }
  .panel-title {
    font-family: var(--font-mono); font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--op-ink-2); display: flex; align-items: center; gap: 10px;
  }
  .panel-title .count {
    font-family: var(--font-mono); font-size: 11px;
    color: var(--op-ink-3); letter-spacing: 0.04em;
  }
  .panel-actions {
    display: flex; align-items: center; gap: 6px;
    font-family: var(--font-mono); font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.10em;
    color: var(--op-ink-3);
  }
  .panel-actions span { padding: 0 8px; cursor: default; }
  .panel-actions span.is-on { color: var(--op-ink); }
  .panel-actions span + span { border-left: 1px solid var(--op-line); }

  .stage-group {
    border-bottom: 1px solid var(--op-line);
  }
  .stage-group:last-child { border-bottom: none; }
  .stage-row {
    padding: 10px 24px 6px;
    display: flex; align-items: baseline; justify-content: space-between;
    border-bottom: 1px dashed var(--op-line);
  }
  .stage-name {
    font-family: var(--font-mono); font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.16em;
    color: var(--op-ink); display: flex; align-items: center; gap: 8px;
  }
  .stage-dot {
    width: 6px; height: 6px; border-radius: 50%;
  }
  .stage-name .meta {
    color: var(--op-ink-3); margin-left: 8px; letter-spacing: 0.04em;
  }
  .stage-totals {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--op-ink-2); letter-spacing: 0.04em;
  }
  .stage-totals strong { color: var(--op-ink); font-weight: 500; }

  .room-list {}
  .room {
    display: grid;
    grid-template-columns: 78px 1fr 88px 130px 96px 80px;
    align-items: center;
    padding: 9px 24px;
    border-bottom: 1px solid var(--op-line);
    font-size: 12px;
  }
  .room:last-child { border-bottom: none; }
  .room:hover { background: var(--op-surface); }
  .room-code {
    font-family: var(--font-mono); font-size: 12px; font-weight: 500;
    color: var(--op-ink); letter-spacing: 0.04em;
  }
  .room-strains {
    font-family: var(--font-sans); font-size: 12px;
    color: var(--op-ink-2); letter-spacing: -0.005em;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .room-day {
    font-family: var(--font-mono); font-size: 11px;
    color: var(--op-ink-2); letter-spacing: 0.02em; text-align: right;
  }
  .room-day strong { color: var(--op-ink); font-weight: 500; }

  .room-cap {
    display: flex; flex-direction: column; gap: 4px;
  }
  .room-cap-bar {
    height: 4px; background: var(--op-line); border-radius: 1px; overflow: hidden;
    position: relative;
  }
  .room-cap-fill {
    height: 100%; background: var(--op-ink-2);
  }
  .room-cap-fill.full { background: var(--accent); }
  .room-cap-fill.low { background: var(--op-ink-3); }
  .room-cap-text {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--op-ink-2); letter-spacing: 0.02em;
  }

  .room-env {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--op-ink-3); display: flex; gap: 8px; letter-spacing: 0.02em;
  }
  .room-env span.warn { color: var(--status-warn); }
  .room-env span.bad { color: var(--status-bad); }

  .room-flag {
    font-family: var(--font-mono); font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.10em;
    text-align: right;
    color: var(--op-ink-3);
  }
  .room-flag.urgent { color: var(--status-bad); }
  .room-flag.attention { color: var(--status-warn); }
  .room-flag.ok { color: var(--op-ink-3); }

  /* Alerts panel */
  .alerts-list {}
  .alert {
    padding: 12px 24px;
    border-bottom: 1px solid var(--op-line);
    display: grid;
    grid-template-columns: 8px 1fr auto;
    column-gap: 12px;
    row-gap: 4px;
  }
  .alert:last-child { border-bottom: none; }
  .alert-bar {
    width: 2px; height: 100%; align-self: stretch;
    background: var(--op-line-strong);
    grid-row: 1 / span 3;
  }
  .alert.urgent .alert-bar { background: var(--status-bad); }
  .alert.attention .alert-bar { background: var(--status-warn); }
  .alert.watch .alert-bar { background: var(--op-ink-3); }

  .alert-head {
    display: flex; align-items: baseline; gap: 8px;
    font-family: var(--font-mono); font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--op-ink-3);
  }
  .alert-head .origin { color: var(--op-ink); }
  .alert-head .kind { color: var(--op-ink-2); }
  .alert-head .tone {}
  .alert.urgent .alert-head .tone { color: var(--status-bad); }
  .alert.attention .alert-head .tone { color: var(--status-warn); }
  .alert.watch .alert-head .tone { color: var(--op-ink-3); }

  .alert-time {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--op-ink-3); letter-spacing: 0.04em;
  }

  .alert-title {
    font-family: var(--font-sans); font-size: 13px; font-weight: 500;
    color: var(--op-ink); letter-spacing: -0.005em; line-height: 1.35;
    grid-column: 2 / 4;
  }
  .alert-detail {
    font-family: var(--font-sans); font-size: 12px;
    color: var(--op-ink-2); line-height: 1.45;
    grid-column: 2 / 4;
  }
  .alert-metric {
    grid-column: 2 / 4;
    display: flex; gap: 16px; align-items: center; margin-top: 2px;
    font-family: var(--font-mono); font-size: 11px;
  }
  .alert-metric .m-label {
    text-transform: uppercase; letter-spacing: 0.10em;
    color: var(--op-ink-3); font-size: 10px;
  }
  .alert-metric .m-val { color: var(--op-ink); font-weight: 500; }
  .alert.urgent .alert-metric .m-val { color: var(--status-bad); }
  .alert-metric .m-target { color: var(--op-ink-3); }
  .alert-actions {
    grid-column: 2 / 4;
    display: flex; gap: 4px; margin-top: 6px;
  }
  .alert-btn {
    font-family: var(--font-mono); font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.10em;
    background: transparent; border: 1px solid var(--op-line-strong);
    color: var(--op-ink); padding: 5px 10px; border-radius: var(--r-xs);
    cursor: default;
  }
  .alert-btn.primary {
    background: var(--accent); border-color: var(--accent); color: #0A0A0A;
    font-weight: 500;
  }

  /* ── Environmentals rail ──────────────────────────────────── */
  .env-rail {
    display: grid; grid-template-columns: repeat(3, 1fr);
    border-top: 1px solid var(--op-line);
    border-bottom: 1px solid var(--op-line);
  }
  .env-card {
    padding: 16px 24px 18px;
    border-right: 1px solid var(--op-line);
  }
  .env-card:last-child { border-right: none; }
  .env-card-head {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 12px;
  }
  .env-card-name {
    font-family: var(--font-mono); font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--op-ink); display: flex; align-items: center; gap: 8px;
  }
  .env-card-meta {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--op-ink-3); letter-spacing: 0.04em;
  }
  .env-card-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
  }
  .env-chart {
    display: flex; flex-direction: column; gap: 4px;
  }
  .env-chart-label {
    font-family: var(--font-mono); font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.10em;
    color: var(--op-ink-3);
    display: flex; justify-content: space-between;
  }
  .env-chart-label .now {
    font-family: var(--font-sans); font-weight: 500; font-size: 13px;
    color: var(--op-ink); letter-spacing: -0.01em; text-transform: none;
  }

  /* ── Today / harvest queue / staff ───────────────────────── */
  .ops-grid {
    display: grid; grid-template-columns: 1fr 1fr;
  }
  .ops-grid > div { border-right: 1px solid var(--op-line); }
  .ops-grid > div:last-child { border-right: none; }

  .task {
    padding: 9px 24px;
    border-bottom: 1px solid var(--op-line);
    display: grid;
    grid-template-columns: 12px 60px 1fr 84px 56px;
    column-gap: 12px;
    align-items: center;
    font-size: 12px;
  }
  .task:last-child { border-bottom: none; }
  .task-check {
    width: 12px; height: 12px; border-radius: 2px;
    border: 1px solid var(--op-line-strong);
    background: transparent;
  }
  .task-check.done {
    background: var(--accent); border-color: var(--accent);
    position: relative;
  }
  .task-check.done::after {
    content: '✓'; position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: #0A0A0A; font-size: 10px; font-weight: 700;
  }
  .task-time {
    font-family: var(--font-mono); font-size: 11px; font-weight: 500;
    color: var(--op-ink); letter-spacing: 0.04em;
  }
  .task.done .task-time { color: var(--op-ink-3); }
  .task-title {
    font-family: var(--font-sans); font-size: 12px;
    color: var(--op-ink); letter-spacing: -0.005em;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .task.done .task-title { color: var(--op-ink-3); text-decoration: line-through; }
  .task-room {
    font-family: var(--font-mono); font-size: 11px;
    color: var(--op-ink-2); letter-spacing: 0.04em;
  }
  .task-who {
    font-family: var(--font-mono); font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--op-ink-2); text-align: right;
  }

  /* Harvest queue */
  .hq {
    padding: 14px 24px 18px;
  }
  .hq-strip {
    display: grid; grid-template-columns: repeat(14, 1fr);
    gap: 4px; margin-top: 10px;
  }
  .hq-day {
    border: 1px solid var(--op-line);
    border-radius: var(--r-xs);
    padding: 8px 6px; min-height: 92px;
    display: flex; flex-direction: column; gap: 4px;
    background: var(--op-canvas);
  }
  .hq-day.is-today { border-color: var(--accent); background: rgba(232,224,212,0.04); }
  .hq-day.is-weekend { background: rgba(255,255,255,0.015); }
  .hq-day-head {
    display: flex; flex-direction: column; gap: 0;
  }
  .hq-day-num {
    font-family: var(--font-sans); font-weight: 500; font-size: 13px;
    color: var(--op-ink); letter-spacing: -0.01em;
  }
  .hq-day.is-today .hq-day-num { color: var(--accent); }
  .hq-day-name {
    font-family: var(--font-mono); font-size: 9px;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--op-ink-3);
  }
  .hq-pill {
    margin-top: auto;
    display: flex; flex-direction: column; gap: 2px;
    padding: 4px 6px;
    background: var(--op-surface);
    border-left: 2px solid var(--op-ink-3);
    border-radius: 0 var(--r-xs) var(--r-xs) 0;
  }
  .hq-pill.harvest { border-left-color: var(--stage-harvest); }
  .hq-pill.dry { border-left-color: var(--op-ink-2); }
  .hq-pill.cure { border-left-color: var(--stage-cure); }
  .hq-pill.package { border-left-color: var(--stage-package); }
  .hq-pill-room {
    font-family: var(--font-mono); font-size: 9px;
    color: var(--op-ink); letter-spacing: 0.04em;
  }
  .hq-pill-strain {
    font-family: var(--font-sans); font-size: 10px;
    color: var(--op-ink-2); letter-spacing: -0.01em;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .hq-pill-plants {
    font-family: var(--font-mono); font-size: 9px;
    color: var(--op-ink-3); letter-spacing: 0.04em;
  }

  /* Staff strip */
  .staff {
    display: flex; gap: 0;
    border-top: 1px solid var(--op-line);
  }
  .staff-cell {
    flex: 1;

// Sparkline — monochrome, warm-white at low opacity. No fill.
// ═════════════════════════════════════════════════════════════════════
function Sparkline({ data, width=92, height=28, dir='up' }) {
  if (!data || !data.length) return null;
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const stepX = width / (data.length - 1);
  const points = data.map((v,i) => [i*stepX, height - ((v-min)/range) * (height-2) - 1]);
  const path = points.map((p,i) => (i===0?'M':'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
  const last = points[points.length-1];
  const stroke = dir === 'down-good' ? 'var(--status-ok)' : 'var(--accent)';
  return (
    <svg width={width} height={height} style={{display:'block'}}>
      <path d={path} fill="none" stroke={stroke} strokeOpacity="0.55" strokeWidth="1.25" />
      <circle cx={last[0]} cy={last[1]} r="2" fill={stroke} />
    </svg>
  );
}

// ═════════════════════════════════════════════════════════════════════
// MiniLine — env cluster chart with target band
// ═════════════════════════════════════════════════════════════════════
function MiniLine({ data, target, width=170, height=46, warn=false }) {
  if (!data || !data.length) return null;
  const yMin = Math.min(target[0], ...data) - 1;
  const yMax = Math.max(target[1], ...data) + 1;
  const range = yMax - yMin;
  const stepX = width / (data.length - 1);
  const ny = v => height - ((v-yMin)/range) * (height-2) - 1;
  const points = data.map((v,i) => [i*stepX, ny(v)]);
  const path = points.map((p,i) => (i===0?'M':'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
  const bandTop = ny(target[1]);
  const bandBot = ny(target[0]);
  return (
    <svg width={width} height={height} style={{display:'block'}}>
      {/* target band */}
      <rect x="0" y={bandTop} width={width} height={bandBot - bandTop}
            fill="var(--accent)" fillOpacity="0.06" />
      <line x1="0" y1={bandTop} x2={width} y2={bandTop} stroke="var(--op-line-strong)" strokeDasharray="2 3" />
      <line x1="0" y1={bandBot} x2={width} y2={bandBot} stroke="var(--op-line-strong)" strokeDasharray="2 3" />
      <path d={path} fill="none"
            stroke={warn ? 'var(--status-warn)' : 'var(--op-ink)'}
            strokeOpacity={warn ? 0.85 : 0.6} strokeWidth="1.25" />
    </svg>
  );
}

                    <div className="room-day"><strong>D{r.day}</strong> / {cycleDays[stage]}</div>
                    <div className="room-cap">
                      <div className="room-cap-bar"><div className={'room-cap-fill ' + pctCls} style={{width: pct + '%'}}/></div>
                      <div className="room-cap-text">{r.plants}/{r.capacity} · {pct}%</div>
                    </div>
                    <div className="room-env">
                      <span>{r.temp.toFixed(1)}°</span>
                      <span className={r.envFlag === 'rh' ? 'bad' : ''}>{r.rh}%</span>
                      {r.vpd && <span className={r.vpd > 1.4 ? 'bad' : ''}>{r.vpd.toFixed(2)}</span>}
                    </div>
                    <div className={'room-flag ' + r.urgency}>
                      {r.flag || (r.urgency === 'ok' ? '—' : '')}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}

      <div className="panel-foot">
        <span>15 rooms · 4,820 plants · 14 in band · 2 flagged</span>
        <span>Updated 11:42:08</span>
      </div>
    </div>
  );
}
