<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0A0A" />
    <title>CultOps - Offline</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #0A0A0A;
        color: #F8F8F8;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        padding-top: calc(2rem + env(safe-area-inset-top, 0px));
        padding-bottom: calc(2rem + env(safe-area-inset-bottom, 0px));
      }
      .offline-icon {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        background: #1C1C1C;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 1.5rem;
      }
      .offline-icon svg {
        width: 32px;
        height: 32px;
        color: #999;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 0.75rem;
        text-align: center;
      }
      p {
        color: #999;
        font-size: 0.875rem;
        text-align: center;
        max-width: 300px;
        line-height: 1.5;
        margin-bottom: 2rem;
      }
      button {
        background: #111;
        color: #F8F8F8;
        border: 1px solid #2E2E2E;
        padding: 0.875rem 2rem;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        cursor: pointer;
        border-radius: 0.375rem;
        min-height: 48px;
        transition: background 0.15s;
      }
      button:active { background: #2E2E2E; }
    </style>
  </head>
  <body>
    <div class="offline-icon">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 0 1 0 12.728M5.636 18.364a9 9 0 0 1 0-12.728M8.464 15.536a5 5 0 0 1 0-7.072M15.536 8.464a5 5 0 0 1 0 7.072M12 12h.01" />
      </svg>
    </div>
    <h1>You're Offline</h1>
    <p>CultOps can't reach the server right now. Check your WiFi connection and try again.</p>
    <button onclick="window.location.reload()">Retry Connection</button>
  </body>
</html>
