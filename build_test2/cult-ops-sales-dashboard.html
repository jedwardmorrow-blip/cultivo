// ============================================================
// SVG chart helpers
// ============================================================
function describeArc(x, y, r, startAngle, endAngle) {
  const rad = a => (a - 90) * Math.PI / 180;
  const sx = x + r * Math.cos(rad(startAngle));
  const sy = y + r * Math.sin(rad(startAngle));
  const ex = x + r * Math.cos(rad(endAngle));
  const ey = y + r * Math.sin(rad(endAngle));
  const large = endAngle - startAngle > 180 ? 1 : 0;
  return `M ${sx} ${sy} A ${r} ${r} 0 ${large} 1 ${ex} ${ey}`;
}

function DonutChart({ segments, size = 120, strokeWidth = 14, label }) {
  const r = (size - strokeWidth) / 2;
  const cx = size / 2, cy = size / 2;
  let current = 0;
  const total = segments.reduce((s, seg) => s + seg.value, 0);
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#1e1e1e" strokeWidth={strokeWidth} />
      {segments.map((seg, i) => {
        if (seg.value === 0) return null;
        const angle = (seg.value / total) * 360;
        const path = describeArc(cx, cy, r, current, current + angle - 0.5);
        current += angle;
        return <path key={i} d={path} fill="none" stroke={seg.color} strokeWidth={strokeWidth} strokeLinecap="round" />;
      })}
      {label && (
        <>
          <text x={cx} y={cy - 6} textAnchor="middle" className="fill-[#f8f8f8] text-[16px] font-extrabold font-mont">{label.value}</text>
          <text x={cx} y={cy + 10} textAnchor="middle" className="fill-[#555] text-[8px] font-bold font-mont tracking-wider">{label.sub}</text>
        </>
      )}
    </svg>
  );
}

function CultLogo({ size = 32 }) {
  return <img src={CULT_LOGO_B64} width={size} height={size} className="rounded-lg object-contain" />;

function MenuBuilder({ strains: allStrains, onClose }) {
  const [copied, setCopied] = useState(false);
  const [pickerGrade, setPickerGrade] = useState('all');
  const [search, setSearch] = useState('');
  const [selectedItems, setSelectedItems] = useState([]);
  const [expandedBatches, setExpandedBatches] = useState({});
  const [selectedBatches, setSelectedBatches] = useState({});

  const toggleBatch = strain => setExpandedBatches(p => ({ ...p, [strain]: !p[strain] }));
  const toggleBatchSelection = (strain, batchId) => {
    setSelectedBatches(p => {
      const current = p[strain] || [];
      return { ...p, [strain]: current.includes(batchId) ? current.filter(b => b !== batchId) : [...current, batchId] };
    });
  };
  const isBatchSelected = (strain, batchId) => (selectedBatches[strain] || []).includes(batchId);

  const availableStrains = useMemo(() => {
    let list = allStrains;
    if (pickerGrade !== 'all') list = list.filter(s => (s.primary_grade || 'U') === pickerGrade);
    if (search) list = list.filter(s => s.strain.toLowerCase().includes(search.toLowerCase()));
    return list;
  }, [allStrains, pickerGrade, search]);

  const addStrain = strain => {
    if (selectedItems.find(i => i.strain === strain.strain)) return;
    const formats = {};
    PRODUCT_FORMATS.forEach(f => { formats[f.id] = { qty: 0, price: f.defaultPrice }; });
    setSelectedItems([...selectedItems, { strain: strain.strain, grade: strain.primary_grade, formats }]);
  };
  const removeStrain = name => setSelectedItems(selectedItems.filter(i => i.strain !== name));
  const updateQty = (strain, formatId, qty) => {
    setSelectedItems(selectedItems.map(i => i.strain === strain ? { ...i, formats: { ...i.formats, [formatId]: { ...i.formats[formatId], qty: Math.max(0, parseInt(qty) || 0) } } } : i));
  };
  const updatePrice = (strain, formatId, price) => {
    setSelectedItems(selectedItems.map(i => i.strain === strain ? { ...i, formats: { ...i.formats, [formatId]: { ...i.formats[formatId], price: Math.max(0, parseFloat(price) || 0) } } } : i));
  };

  const totals = useMemo(() => {
    let units = 0, revenue = 0;
    selectedItems.forEach(item => {
      Object.values(item.formats).forEach(d => {
        units += d.qty;
        revenue += d.qty * d.price;
      });
    });
    return { units, revenue };
  }, [selectedItems]);

  const activeItems = selectedItems.filter(i => Object.values(i.formats).some(f => f.qty > 0));

  const buildPlainText = () => {
    const today = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    let lines = [`CULT OPS — Order Menu`, `Date: ${today}`, ''];
    activeItems.forEach(item => {
      const gc = GRADE_COLORS[item.grade] || GRADE_COLORS.U;
      lines.push(`${item.strain} [${gc.label}]`);
      const batches = selectedBatches[item.strain] || [];
      if (batches.length > 0) lines.push(`  Batches: ${batches.join(', ')}`);
      PRODUCT_FORMATS.forEach(f => {
        const d = item.formats[f.id];
        if (d.qty > 0) lines.push(`  ${f.label}: ${d.qty} × $${d.price} = $${(d.qty * d.price).toLocaleString()}`);
      });
      lines.push('');
    });
    lines.push(`Total: ${totals.units} units — $${totals.revenue.toLocaleString()}`);
    return lines.join('\n');
  };

  const handleCopy = async () => {
    await navigator.clipboard.writeText(buildPlainText());
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  };

  const handlePrint = () => {
    const today = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    const w = window.open('', '_blank');
    w.document.write(`<html><head><title>Cult Ops Menu</title>
      <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
      <style>
        body { font-family: 'Inter', sans-serif; max-width: 700px; margin: 40px auto; color: #1a1a1a; }
        h1 { font-family: 'Montserrat', sans-serif; font-size: 22px; font-weight: 800; margin-bottom: 4px; }
        h2 { font-family: 'Montserrat', sans-serif; font-size: 11px; color: #888; font-weight: 600; letter-spacing: 0.1em; margin-bottom: 24px; }
        .item { margin-bottom: 18px; border-bottom: 1px solid #eee; padding-bottom: 14px; }
        .strain { font-family: 'Montserrat', sans-serif; font-size: 15px; font-weight: 700; margin-bottom: 6px; }
        .grade { font-size: 10px; padding: 2px 8px; border-radius: 99px; font-weight: 700; margin-left: 8px; }
        .line { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; }
        .batches { font-size: 11px; color: #888; margin-bottom: 6px; }
        .total { font-family: 'Montserrat', sans-serif; font-size: 20px; font-weight: 800; margin-top: 20px; padding-top: 16px; border-top: 2px solid #1a1a1a; display: flex; justify-content: space-between; }
        .foot { font-size: 10px; color: #bbb; text-align: center; margin-top: 30px; }
        @media print { body { margin: 20px; } }
      </style></head><body>`);
    w.document.write(`<h1>CULT OPS</h1><h2>ORDER MENU · ${today}</h2>`);
    activeItems.forEach(item => {
      const gc = GRADE_COLORS[item.grade] || GRADE_COLORS.U;
      w.document.write(`<div class="item"><div class="strain">${item.strain}<span class="grade" style="background:${gc.bg};color:${gc.text};border:1px solid ${gc.border}">${gc.label}</span></div>`);
      const batches = selectedBatches[item.strain] || [];
      if (batches.length > 0) w.document.write(`<div class="batches">Batches: ${batches.join(', ')}</div>`);
      PRODUCT_FORMATS.forEach(f => {
        const d = item.formats[f.id];
        if (d.qty > 0) w.document.write(`<div class="line"><span>${f.label}: ${d.qty} units</span><span>$${(d.qty * d.price).toLocaleString()}</span></div>`);
      });
      w.document.write('</div>');
    });
    w.document.write(`<div class="total"><span>${totals.units} units</span><span>$${totals.revenue.toLocaleString()}</span></div>`);
    w.document.write(`<div class="foot">Cult Ops · Generated ${today}</div>`);
    w.document.write('</body></html>');
    w.document.close();
    setTimeout(() => w.print(), 300);
  };

  const gradeOptions = ['all', 'CULT', 'B', 'C', 'D', 'U'];

  return (
    <>
      {/* Overlay */}
      <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[999]" onClick={onClose} />

      {/* Modal */}
      <div className="fixed z-[1000] flex flex-col animate-fade-in rounded-2xl border border-cult-border overflow-hidden bg-[#0c0c0c]"
        style={{ top: '6vh', left: '50%', transform: 'translateX(-50%)', width: '1020px', maxHeight: '88vh' }}>

        {/* Header */}
        <div className="flex items-center justify-between px-5 py-3 border-b border-cult-border flex-shrink-0">
          <div className="flex items-center gap-3">
            <CultLogo size={28} />
            <div>
              <div className="text-[14px] font-extrabold text-[#f8f8f8] font-mont">Order Builder</div>
              <div className="text-[9px] text-[#333]">{new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</div>
            </div>
          </div>
          <div className="flex items-center gap-2">
            <button onClick={handleCopy}
              className="px-3 py-[6px] rounded-lg text-[11px] font-bold border-none cursor-pointer font-inter transition-all duration-150"
              style={{ background: copied ? TEAL + '22' : '#141414', color: copied ? TEAL : '#888' }}
            >{copied ? '✓ Copied' : 'Copy'}</button>
            <button onClick={handlePrint}
              className="px-3 py-[6px] rounded-lg text-[11px] font-bold border-none cursor-pointer font-inter transition-all duration-150 bg-cult-surface text-[#888]"
            >Print</button>
            <button onClick={onClose}
              className="w-7 h-7 rounded-lg flex items-center justify-center border-none cursor-pointer text-[14px] transition-all duration-150"
              style={{ background: '#141414', color: '#555' }}
              onMouseEnter={e => e.currentTarget.style.color = '#ff6b6b'}
              onMouseLeave={e => e.currentTarget.style.color = '#555'}
            >×</button>
          </div>
        </div>

        {/* Two-panel body */}
        <div className="flex flex-1 min-h-0">
          {/* Left: strain picker */}
          <div className="flex flex-col border-r border-cult-border flex-shrink-0 w-[270px] bg-cult-bg">
            <div className="p-3 border-b border-cult-border">
              <input type="text" placeholder="Search strains..." value={search} onChange={e => setSearch(e.target.value)}
                className="w-full rounded-lg border px-3 py-[6px] text-[12px] text-[#f8f8f8] font-inter outline-none transition-colors duration-150"
                style={{ background: '#111', borderColor: '#1e1e1e' }}
                onFocus={e => e.currentTarget.style.borderColor = TEAL}
                onBlur={e => e.currentTarget.style.borderColor = '#1e1e1e'}

              />
              <div className="flex gap-1 mt-2 flex-wrap">
                {gradeOptions.map(g => {
                  const active = pickerGrade === g;
                  const gc = g !== 'all' ? GRADE_COLORS[g] : null;
                  return (
                    <button key={g} onClick={() => setPickerGrade(g)}
                      className="px-[6px] py-[2px] rounded text-[9px] font-bold border cursor-pointer transition-all duration-150"
                      style={{
                        background: active ? (gc ? gc.bg : '#111') : 'transparent',
                        color: active ? (gc ? gc.text : '#888') : '#333',
                        borderColor: active ? (gc ? gc.border : '#333') : '#1a1a1a'
                      }}
                    >{g === 'all' ? 'All' : g}</button>
                  );
                })}
              </div>
            </div>
            <div className="flex-1 overflow-y-auto">
              {availableStrains.map(s => {
                const gc = GRADE_COLORS[s.primary_grade] || GRADE_COLORS.U;
                const already = selectedItems.find(i => i.strain === s.strain);
                const batches = BATCH_DATA[s.strain] || [];
                return (
                  <div key={s.strain} onClick={() => !already && addStrain(s)}
                    className={`flex items-center gap-2 px-3 py-[7px] border-b border-cult-card2 transition-colors duration-150 ${already ? 'opacity-40 cursor-default' : 'cursor-pointer hover:bg-[#111]'}`}
                  >
                    <span className="w-[6px] h-[6px] rounded-full flex-shrink-0" style={{ background: gc.text }} />
                    <span className="text-[11px] font-semibold text-[#c8c8c8] flex-1 truncate">{s.strain}</span>
                    {batches.length > 0 && <span className="text-[8px] text-[#333] font-semibold">{batches.length}b</span>}
                  </div>
                );
              })}
            </div>
            <div className="px-3 py-2 text-[9px] text-[#222] border-t border-cult-border font-semibold">{availableStrains.length} available</div>
          </div>

          {/* Right: order builder */}
          <div className="flex-1 flex flex-col min-w-0">
            <div className="flex-1 overflow-y-auto p-4">
              {selectedItems.length === 0 && (
                <div className="flex flex-col items-center justify-center h-full text-[#222]">
                  <div className="text-[28px] mb-2">←</div>
                  <div className="text-[12px] font-semibold">Select strains from the left panel</div>
                </div>
              )}

              {selectedItems.map(item => {
                const gc = GRADE_COLORS[item.grade] || GRADE_COLORS.U;
                const batches = BATCH_DATA[item.strain] || [];
                const showBatches = expandedBatches[item.strain];
                return (
                  <div key={item.strain} className="mb-3 rounded-xl border overflow-hidden bg-cult-card border-cult-border3">
                    <div className="flex items-center justify-between px-4 py-[10px]">
                      <div className="flex items-center gap-2">
                        <GradeBadge grade={item.grade} />
                        <span className="text-[13px] font-bold text-[#e8e8e8] font-mont">{item.strain}</span>
                      </div>
                      <div className="flex items-center gap-2">
                        {batches.length > 0 && (
                          <button onClick={() => toggleBatch(item.strain)}
                            className="px-2 py-[3px] rounded-md text-[9px] font-bold border cursor-pointer transition-all duration-150"
                            style={{
                              background: showBatches ? TEAL + '11' : '#111',
                              color: showBatches ? TEAL : '#444',
                              borderColor: showBatches ? TEAL + '33' : '#1a1a1a'
                            }}
                          >{showBatches ? 'Hide' : 'Batches'} ({batches.length})</button>
                        )}
                        <button onClick={() => removeStrain(item.strain)}
                          className="w-6 h-6 rounded-md flex items-center justify-center text-[11px] border-none cursor-pointer transition-all duration-150"
                          style={{ background: '#111', color: '#333' }}
                          onMouseEnter={e => { e.currentTarget.style.background = '#1a0a0a'; e.currentTarget.style.color = '#ff6b6b'; }}
                          onMouseLeave={e => { e.currentTarget.style.background = '#111'; e.currentTarget.style.color = '#333'; }}
                        >×</button>
                      </div>
                    </div>

                    {/* Product formats */}
                    <div className="px-4 pb-3">
                      {PRODUCT_FORMATS.map(f => {
                        const d = item.formats[f.id] || { qty: 0, price: f.defaultPrice };
                        const hasQty = d.qty > 0;
                        return (
                          <div key={f.id} className="flex items-center gap-2 py-[5px] rounded-lg px-2 mb-[2px]" style={{ background: hasQty ? '#0a1a0e' : 'transparent' }}>
                            <span className="text-[11px] font-semibold min-w-[85px]" style={{ color: hasQty ? '#c8c8c8' : '#555' }}>{f.label}</span>
                            <input type="number" min="0" value={d.qty || ''} placeholder="0"
                              onChange={e => updateQty(item.strain, f.id, e.target.value)}
                              className="w-[52px] py-[5px] px-2 rounded-md border text-[13px] font-semibold text-right text-[#f8f8f8] outline-none font-mont transition-colors duration-150"
                              style={{ background: '#141414', borderColor: '#262626' }}
                              onFocus={e => e.currentTarget.style.borderColor = TEAL}
                              onBlur={e => e.currentTarget.style.borderColor = '#262626'} />
                            <span className="text-[11px] text-[#333]">×</span>
                            <div className="flex items-center">
                              <span className="text-[12px] text-[#555] mr-[2px]">$</span>
                              <input type="number" min="0" value={d.price || ''}
                                onChange={e => updatePrice(item.strain, f.id, e.target.value)}
                                className="w-[60px] py-[5px] px-2 rounded-md border text-[13px] font-semibold text-right text-[#f8f8f8] outline-none font-mont transition-colors duration-150"
                                style={{ background: '#141414', borderColor: '#262626' }}
                                onFocus={e => e.currentTarget.style.borderColor = TEAL}
                                onBlur={e => e.currentTarget.style.borderColor = '#262626'} />
                            </div>
                            {hasQty && (
                              <span className="text-[12px] font-bold min-w-[70px] text-right ml-auto" style={{ color: TEAL }}>
                                = ${(d.qty * d.price).toLocaleString()}
                              </span>
                            )}
                          </div>
                        );
                      })}
                    </div>

                    {/* Expandable batch breakdown with selection */}
                    {showBatches && batches.length > 0 && (
                      <div className="border-t px-[14px] py-[10px] border-cult-subtle bg-[#090909]">
                        <div className="flex justify-between items-center mb-2">
                          <div className="text-[9px] font-bold text-[#444] tracking-[0.08em]">SELECT BATCHES</div>
                          {(selectedBatches[item.strain] || []).length > 0 && (
                            <span className="text-[9px] font-bold" style={{ color: TEAL }}>
                              {(selectedBatches[item.strain] || []).length} selected
                            </span>
                          )}
                        </div>
                        <div className="flex flex-col gap-[6px]">
                          {batches.map(b => {
                            const sel = isBatchSelected(item.strain, b.batch);
                            return (
                              <div key={b.batch} onClick={() => toggleBatchSelection(item.strain, b.batch)}
                                className="rounded-lg p-2 cursor-pointer transition-all duration-150"
                                style={{
                                  background: sel ? `${TEAL}08` : '#0e0e0e',
                                  border: `1px solid ${sel ? TEAL + '33' : '#161616'}`
                                }}>
                                <div className="flex justify-between items-center mb-[6px]">
                                  <div className="flex items-center gap-2">
                                    <span className="w-4 h-4 rounded flex-shrink-0 flex items-center justify-center text-[10px] font-black transition-all duration-150"
                                      style={{
                                        border: `2px solid ${sel ? TEAL : '#333'}`,
                                        background: sel ? TEAL : 'transparent',
                                        color: '#0a0a0a'
                                      }}>{sel ? '✓' : ''}</span>
                                    <span className="text-[12px] font-bold font-mont" style={{ color: sel ? '#f0f0f0' : '#c8c8c8' }}>{b.batch}</span>
                                    <span className="text-[9px] px-[6px] py-px rounded font-semibold border bg-[#151515] text-[#555] border-cult-subtle">
                                      {BATCH_STATE_LABELS[b.state] || b.state}
                                    </span>
                                    {b.thc != null && <span className="text-[9px] px-[6px] py-px rounded font-bold border" style={{ background: '#0a2a0a', color: TEAL, borderColor: '#22c55e33' }}>THC {b.thc}%</span>}
                                  </div>
                                  <span className="text-[10px] text-[#333]">{b.harvest}</span>
                                </div>
                                <div className="flex gap-1 flex-wrap">
                                  {Object.entries(b.stages).map(([stage, data]) => {
                                    const avail = data.a || 0;
                                    const total = data.w || 0;
                                    const pct = total > 0 ? Math.round((avail / total) * 100) : 0;
                                    return (
                                      <div key={stage} className="flex flex-col min-w-[70px] rounded-md p-[4px_8px] border bg-cult-card2 border-cult-subtle">
                                        <span className="text-[8px] text-[#444] font-bold tracking-[0.06em]">
                                          {BATCH_STAGE_LABELS[stage] || stage}
                                        </span>
                                        <span className="text-[12px] font-bold" style={{ color: avail > 0 ? TEAL : '#2a2a2a' }}>
                                          {fmt.g(avail)}
                                        </span>
                                        <span className="text-[8px] text-[#333]">
                                          of {fmt.g(total)} ({pct}%)
                                        </span>
                                      </div>
                                    );
                                  })}
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            {/* Summary footer */}
            <div className="flex justify-between items-center px-[18px] py-3 border-t border-cult-border flex-shrink-0 bg-[#0c0c0c]">
              <div className="flex gap-5">
                <div>
                  <div className="text-[9px] font-bold text-[#444] tracking-[0.1em]">STRAINS</div>
                  <div className="text-[18px] font-extrabold" style={{ color: activeItems.length > 0 ? '#f8f8f8' : '#222' }}>{activeItems.length}</div>
                </div>
                <div>
                  <div className="text-[9px] font-bold text-[#444] tracking-[0.1em]">UNITS</div>
                  <div className="text-[18px] font-extrabold" style={{ color: totals.units > 0 ? '#f8f8f8' : '#222' }}>{totals.units}</div>
                </div>
                <div>
                  <div className="text-[9px] font-bold text-[#444] tracking-[0.1em]">EST. REVENUE</div>
                  <div className="text-[18px] font-extrabold" style={{ color: totals.revenue > 0 ? TEAL : '#222' }}>${totals.revenue.toLocaleString()}</div>
                </div>
              </div>
              <div className="flex items-center gap-2">
                <span className="text-[9px] text-[#222] font-semibold tracking-[0.06em]">CULT OPS</span>
                <span className="w-1 h-1 rounded-full opacity-40" style={{ background: TEAL }} />
              </div>
            </div>
          </div>
        </div>
      </div>
    </>
  );
}

// ============================================================
// MAIN APP
// ============================================================
function App() {
  const [filter, setFilter] = useState('all');
  const [gradeFilter, setGradeFilter] = useState('all');
  const [sort, setSort] = useState('revenue');
  const [showMenu, setShowMenu] = useState(false);
  const healthOrder = { critical: 0, low: 1, warning: 2, healthy: 3 };

  const strains = useMemo(() => {
    let list = DATA.strains;
    if (filter !== 'all') list = list.filter(s => s.supply_health === filter);
    if (gradeFilter !== 'all') list = list.filter(s => (s.primary_grade || 'U') === gradeFilter);
    return [...list].sort((a, b) => {
      if (sort === 'revenue') return b.total_demand_revenue - a.total_demand_revenue;
      if (sort === 'health') return (healthOrder[a.supply_health] - healthOrder[b.supply_health]) || (b.total_demand_revenue - a.total_demand_revenue);
      return a.strain.localeCompare(b.strain);
    });
  }, [filter, gradeFilter, sort]);

  return (
    <div className="max-w-[1280px] mx-auto px-6 py-5 no-print">
      {/* Header */}
      <div className="flex justify-between items-center mb-4">
        <div>
          <div className="text-[10px] font-bold tracking-[0.12em] mb-[2px]" style={{ color: TEAL }}>CULT OPS</div>
          <h1 className="text-[22px] font-extrabold text-[#f8f8f8] m-0">Inventory Pipeline</h1>
        </div>
        <div className="flex gap-[10px] items-center">
          <button onClick={() => setShowMenu(true)}
            className="px-4 py-2 rounded-lg text-[12px] font-bold cursor-pointer transition-all duration-150 tracking-[0.02em]"
            style={{
              border: `1px solid ${TEAL}44`,
              background: `${TEAL}12`,
              color: TEAL
            }}
            onMouseEnter={e => { e.currentTarget.style.background = `${TEAL}22`; }}
            onMouseLeave={e => { e.currentTarget.style.background = `${TEAL}12`; }}
          >Build Menu</button>
          <div className="text-[10px] text-cult-muted text-right">
            <div>36 strains · {DATA.summary.strain_count.with_active_demand} with demand</div>
          </div>
        </div>
      </div>

      {/* Summary Cards */}
      <HeroCards />

      {/* Charts Row */}
      <div className="grid grid-cols-3 gap-3 mb-4">
        <InventoryBreakdown />
        <PipelineOverview />
        <HealthSummary />
      </div>

      {/* Strain Table */}
      <StrainTable strains={strains} filter={filter} setFilter={setFilter} gradeFilter={gradeFilter} setGradeFilter={setGradeFilter} sort={sort} setSort={setSort} />

      {/* Footer */}
      <div className="border-t border-cult-surface pt-3 mt-5 text-[10px] text-cult-muted text-center">
        Cult Ops Sales Dashboard · v5 · Simplified view
      </div>

      {showMenu && <MenuBuilder strains={strains} onClose={() => setShowMenu(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
